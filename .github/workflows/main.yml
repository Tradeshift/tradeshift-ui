name: Test & release

on:
  pull_request:
  push:
    branches:
      - master
      - v11

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ github.ref == 'refs/heads/v11' && 8 || 18 }}
          cache: 'npm'

      - name: 📥 Download deps
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps

      # Lint + build + run the suite on all local engines. Video/screenshots/
      # traces are captured on failure (see playwright.config.js) and uploaded
      # below. Blocking: a test failure fails the build.
      - name: ▶️ Run tests
        run: npm test

      - name: ⬆️ Upload Playwright artifacts (video/screenshots/trace)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7
